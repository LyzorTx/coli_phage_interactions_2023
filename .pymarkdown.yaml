extensions:
  front-matter:
    enabled: true

plugins:
  # MD013: line length
  md013:
    line_length: 120
    code_blocks: false
    headings: false
    strict: false
    stern: false
  # MD024: duplicate headings — allow identical subheadings under different parents
  # (lab notebook entries repeat "Executive summary", "What was implemented", etc.)
  md024:
    allow_different_nesting: true
  # MD025: multiple top-level headings in the same document
  md025:
    enabled: false
  # MD031: blank lines around fenced code blocks
  md031:
    enabled: false
  # MD033: inline HTML
  md033:
    enabled: false
  # MD034: bare URLs — research notes, PLAN.md, and lab notebooks use bare URLs
  md034:
    enabled: false
  # MD036: emphasis as heading — lab notebooks use bold text as sub-section markers
  md036:
    enabled: false
  # MD041: first line in file should be a top-level heading
  md041:
    enabled: false
