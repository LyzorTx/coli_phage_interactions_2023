name: Publish Explainability UI

on:
  push:
    branches:
      - main
    paths:
      - lyzortx/explainability_ui/**
      - .github/workflows/publish-explainability-ui.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy UI to GitHub Pages
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Stage UI files at /explainability/
        run: |
          set -euo pipefail
          mkdir -p _site/explainability/data _site/explainability/docs
          cp lyzortx/explainability_ui/index.html _site/explainability/
          cp lyzortx/explainability_ui/main.js _site/explainability/
          cp lyzortx/explainability_ui/style.css _site/explainability/
          # Markdown source files for the Glossary + Knowledge tabs. Rendered client-side
          # via marked.js (same-origin fetch from ./docs/).
          cp lyzortx/research_notes/GLOSSARY.md _site/explainability/docs/
          cp lyzortx/KNOWLEDGE.md _site/explainability/docs/
          # Root-level redirect so visitors landing on <user>.github.io/<repo>/ land on the UI.
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./explainability/">
          <title>CHISEL explainability — redirect</title>
          <p>Redirecting to <a href="./explainability/">./explainability/</a>…</p>
          HTML

      - name: Bundle latest release data assets (same-origin, bypasses CORS)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # GitHub release asset URLs do not serve Access-Control-Allow-Origin, so the browser
          # cannot fetch them cross-origin from a Pages site. We bake the release assets into
          # the Pages deployment artifact so the UI can fetch them same-origin via ./data/.
          tag=$(gh release view --json tagName -q .tagName || true)
          if [ -z "$tag" ]; then
            echo "::warning::No GitHub release found; deploying UI without data. Publish a release with gh release create to populate ./data/."
          else
            echo "Downloading assets from release $tag"
            gh release download "$tag" \
              --pattern '*.json' \
              --pattern '*.parquet' \
              --dir _site/explainability/data
            echo "Bundled data files:"
            ls -la _site/explainability/data
          fi
          ls -R _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
