name: Unit Tests

on:
  pull_request:

jobs:
  unit-tests:
    name: Python Unit Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

      - name: Pymarkdown lint scan
        run: |
          pip install pymarkdownlnt==0.9.36
          pymarkdown --config .pymarkdown.yaml scan -r -e ".agents/skills" .

      - name: Run pytest with coverage
        run: |
          pytest -n auto --dist loadfile --durations=25 --cov=lyzortx --cov-report=xml:coverage.xml lyzortx/tests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Verify PLAN.md is up to date with plan.yml
        run: |
          python -m lyzortx.orchestration.render_plan --stdout > /tmp/PLAN_generated.md
          diff lyzortx/research_notes/PLAN.md /tmp/PLAN_generated.md || \
            (echo "::error::PLAN.md is out of sync with plan.yml. Run: python -m lyzortx.orchestration.render_plan" && exit 1)

      - name: Verify KNOWLEDGE.md is up to date with knowledge.yml
        run: |
          python -m lyzortx.orchestration.render_knowledge --stdout > /tmp/KNOWLEDGE_generated.md
          diff lyzortx/KNOWLEDGE.md /tmp/KNOWLEDGE_generated.md || \
            (echo "::error::KNOWLEDGE.md is out of sync with knowledge.yml. Run: python -m lyzortx.orchestration.render_knowledge" && exit 1)
