name: Steel Thread Regression

on:
  pull_request:
    paths:
      - ".github/workflows/steel-thread-regression.yml"
      - "lyzortx/pipeline/steel_thread_v0/**"
      - "data/interactions/**"
      - "data/metadata/**"
  push:
    paths:
      - ".github/workflows/steel-thread-regression.yml"
      - "lyzortx/pipeline/steel_thread_v0/**"
      - "data/interactions/**"
      - "data/metadata/**"

jobs:
  st-regression:
    name: Steel Thread Regression Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.12"

      - name: Install ML dependencies
        run: |
          pip install -r requirements.txt

      - name: Run ST0.1 regression check
        run: |
          python -m lyzortx.pipeline.steel_thread_v0.checks.check_st01_regression --run-st01

      - name: Run ST0.1b regression check
        run: |
          python -m lyzortx.pipeline.steel_thread_v0.checks.check_st01b_regression --run-st01 --run-st01b

      - name: Run ST0.2 regression check
        run: |
          python -m lyzortx.pipeline.steel_thread_v0.checks.check_st02_regression --run-st01 --run-st01b --run-st02

      - name: Run ST0.3 regression check
        run: |
          python -m lyzortx.pipeline.steel_thread_v0.checks.check_st03_regression --run-st01 --run-st01b --run-st02 --run-st03

      - name: Run ST0.4 regression check
        run: |
          python -m lyzortx.pipeline.steel_thread_v0.checks.check_st04_regression --run-st01 --run-st01b --run-st02 --run-st03 --run-st04

      - name: Run ST0.5 regression check
        run: |
          python -m lyzortx.pipeline.steel_thread_v0.checks.check_st05_regression --run-st01 --run-st01b --run-st02 --run-st03 --run-st04 --run-st05

      - name: Run ST0.6 regression check
        run: |
          python -m lyzortx.pipeline.steel_thread_v0.checks.check_st06_regression --run-st01 --run-st01b --run-st02 --run-st03 --run-st04 --run-st05 --run-st06

      - name: Run ST0.7 regression check
        run: |
          python -m lyzortx.pipeline.steel_thread_v0.checks.check_st07_regression --run-st01 --run-st01b --run-st02 --run-st03 --run-st04 --run-st05 --run-st06 --run-st07
