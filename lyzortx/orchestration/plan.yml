  AUTORESEARCH:
    name: Raw-FASTA Autoresearch
    description: 'Replan AUTORESEARCH as a raw-input search track instead of a DEPLOY-artifact
      consumer. The scientific contract is train-inference parity: start from raw
      interactions, host FASTAs, and phage FASTAs; reuse only helper code that extracts
      features from unseen genomes at runtime; freeze that preprocessing in `prepare.py`;
      let `autoresearch` mutate `train.py` only. Checked-in DEPLOY CSVs are optional
      warm caches at most, never source-of-truth inputs. Post-AR09 promotion into
      the main pipeline is a human decision, not an automated step.'
    stage: 5
    depends_on:
    - A
    tasks:
    - id: AR01
      title: Lock the AUTORESEARCH corpus, label policy, and sealed split contract
      status: done
      model: gpt-5.4
      ci_image_profile: base
      acceptance_criteria:
      - Freeze the AUTORESEARCH input contract to exactly `data/interactions/raw/raw_interactions.csv`,
        host assemblies resolved via `lyzortx/pipeline/deployment_paired_features/download_picard_assemblies.py`,
        and phage FASTAs under `data/genomics/phages/FNA/`
      - Reuse the Track A `label_set_v1` pair-label semantics plus `training_weight_v3`
        as the v1 AUTORESEARCH label policy; document the exact handling of `score='n'`
        and make labels read-only for all downstream search tasks
      - Materialize one canonical pair table keyed by `bacteria` and `phage` that
        records label, training weight, host FASTA path, phage FASTA path, and explicit
        exclusion reasons for any unmatched raw rows; fail loudly if a retained training
        pair lacks a FASTA on either side
      - Predeclare `train`, `inner_val`, and sealed `holdout` splits before any model
        search, require that no bacterium appears in more than one split, and write
        a manifest with row counts, bacteria/phage counts, split hashes, and input-file
        checksums under `lyzortx/generated_outputs/autoresearch/`
      - Record in that split/benchmark manifest the exact comparator artifact identifier,
        path, or manifest key for the current locked production-intent benchmark that
        AR09 must compare against on the sealed holdout
      - Remove any conceptual dependency on DEPLOY artifacts from the AUTORESEARCH
        track; code reuse is allowed, but training inputs must be reproducible from
        the raw contract
    - id: AR02
      title: Scaffold the sandbox and freeze the cache and manifest contract
      status: done
      model: gpt-5.4
      ci_image_profile: base
