  GIANTS:
    name: Three-Layer Biological Prediction
    description: 'Build features for each biological layer of phage infection — capsule
      penetration (depolymerase), receptor binding (RBP-OMP), and defense survival
      — then integrate with RFE-based feature selection. The hypothesis: lysis requires
      passing adsorption gates (Gate 1 OR Gate 2) then surviving host defenses (Gate
      3). Baseline: AUTORESEARCH all-pairs 0.810 AUC on ST03 holdout.

      '
    stage: 6
    depends_on:
    - AUTORESEARCH
    tasks:
    - id: GT01
      title: Depolymerase-capsule compatibility layer
      status: done
      model: claude-opus-4-6
      ci_image_profile: base
      depends_on_tasks: []
      acceptance_criteria:
      - Run DepoScope on phage protein sets (from Pharokka CDS or pyrodigal) to identify
        depolymerases with domain boundaries and fold classification
      - Union DepoScope hits with Pharokka tail spike annotations (fix DEPOLYMERASE_PATTERNS
        to match "tail spike protein") for maximum recall
      - Cluster enzymatic domains by fold type and sequence similarity; report cluster
        count and phage distribution
      - Create directed cross-term features (depolymerase_cluster x host_capsule_profile_score)
        materialized as a new feature slot
      - Verify host-side capsule variation exists in the training set (99 capsule
        features, 369 hosts with nonzero profiles)
      - Record results in track_GIANTS.md
    - id: GT02
      title: RBP-OMP receptor compatibility layer
      status: done
      model: claude-opus-4-6
      ci_image_profile: base
      depends_on_tasks: []
      acceptance_criteria:
      - Map our 96 phages to OMP receptor classes using genus-level lookup from Moriniere
        2026 Table S1 (downloaded to .scratch/genophi/Table_S1_Phages.tsv)
      - Assign high-confidence genera a receptor class; mark "Resistant" genera as
        unknown (not "no OMP receptor"); log coverage statistics
      - Create directed cross-term features (predicted_receptor x host_OMP_HMM_score)
        materialized as a new feature slot
      - Document which genera have clean vs ambiguous vs unknown receptor assignments
      - If cross-terms show lift on clean-assignment genera but not noisy ones, flag
        GenoPHI per-phage prediction as a follow-up
      - Record results in track_GIANTS.md
    - id: GT03
      title: Three-layer integration with RFE and class weighting
      status: done
      model: claude-opus-4-6
      ci_image_profile: base
      depends_on_tasks:
      - GT01
      - GT02
      acceptance_criteria:
      - Combine Gate 1 features (depolymerase x capsule) + Gate 2 features (receptor
        x OMP) + Gate 3 features (all 79+ DefenseFinder defense system counts) with
        existing 5-slot AUTORESEARCH features
      - Apply RFE feature selection to prune confounded or uninformative features
      - Apply inverse-frequency class weighting for narrow-host phages
      - All-pairs architecture only (no per-phage blending), LightGBM
      - Run on ST03 holdout with 3 seeds and 1000 bootstrap resamples
      - Compare to AUTORESEARCH all-pairs baseline (0.810 AUC, 90.8% top-3, 0.167
        Brier) with bootstrap CIs
      - Per-gate ablation table showing contribution of each layer
      - Error bucket re-analysis comparing to the 6/65 all-pairs misses
      - If S1 genus mapping showed signal in clean-assignment genera, flag GenoPHI
        per-phage prediction as a follow-up
      - Record full results and interpretation in track_GIANTS.md
    - id: GT04
      title: HPO with Optuna on three-layer feature set
      status: done
      model: claude-opus-4-6
      ci_image_profile: base
      depends_on_tasks:
      - GT03
      acceptance_criteria:
      - Lightweight HPO via Optuna (~50 trials) over key LightGBM params (num_leaves,
        min_child_samples, learning_rate, feature_fraction, reg_lambda) using the
        GT03 feature set and RFE-selected features
      - New feature families have different scales and sparsity than the original
        config, so old hyperparams may be suboptimal
      - Run best params on ST03 holdout with 3 seeds and 1000 bootstrap resamples
      - Compare to GT03 baseline with bootstrap CIs and error bucket re-analysis
      - Record results in track_GIANTS.md
    - id: GT05
      title: CatBoost comparison on three-layer feature set
      status: done
      model: claude-opus-4-6
      ci_image_profile: base
      depends_on_tasks:
      - GT03
      acceptance_criteria:
      - Replace LightGBM with CatBoost using the GT03 feature set (GenoPHI found CatBoost
        + RFE optimal on this dataset)
      - CatBoost handles categoricals (phylogroup, serotype, ST) natively — use cat_features
        instead of one-hot encoding
      - Lightweight HPO via Optuna (~50 trials) over CatBoost-specific params (depth,
        learning_rate, l2_leaf_reg, random_strength)
      - Run on ST03 holdout with 3 seeds and 1000 bootstrap resamples
      - Compare to GT03 (LightGBM) and GT04 (tuned LightGBM) with bootstrap CIs
      - Record results in track_GIANTS.md
    - id: GT06
      title: GenoPHI per-phage receptor prediction to strengthen Gate 2
      status: done
      model: claude-opus-4-6
      ci_image_profile: base
      depends_on_tasks:
      - GT04
      - GT05
      acceptance_criteria:
      - Run GenoPHI v0.1 (or reproduce its receptor classification approach) on our
