      - Compare to GT03 all_gates_rfe baseline (0.823 AUC) with bootstrap CIs
      - Record results in track_GIANTS.md
    - id: GT07
      title: OMP extracellular loop variant features
      status: done
      model: claude-opus-4-6
      ci_image_profile: base
      depends_on_tasks:
      - GT06
      acceptance_criteria:
      - 'VARIANCE PRE-FLIGHT: Before building the full pipeline, extract OMP sequences
        for a sample of hosts, compute loop-region features, and report CV and unique
        value counts. If loop features have CV < 0.1 or Cohen d < 0.1 for lysed vs
        non-lysed discrimination, stop and report the dead end — do not build the
        full evaluation pipeline.'
      - Extract OMP protein sequences (OmpC, BtuB, Tsx, FhuA, LptD, OmpF) from all
