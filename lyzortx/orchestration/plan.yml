      - Combine binary protein-family features with GT03 mechanistic feature set
      - Evaluate combined feature set on ST03 holdout with 3 seeds and 1000 bootstrap
        resamples
      - Compare to GT03 all_gates_rfe baseline (0.823 AUC) with bootstrap CIs
      - Record results and biological interpretation in track_GIANTS.md
    - id: GT09
      title: BASEL phage panel expansion (superseded by Track SPANDEX)
      status: cancelled
      model: claude-opus-4-6
      ci_image_profile: base
      depends_on_tasks:
      - GT07
      - GT08
      acceptance_criteria:
      - Superseded by Track SPANDEX which integrates BASEL expansion with a new evaluation
        framework (graded nDCG/mAP replacing top-3, k-fold CV, clean labels, ordinal
        prediction). Original GT09 scope folded into SX02 and SX03.
  SPANDEX:
    name: Sparse Panel Data Expansion
    description: >
      Overhaul evaluation metrics (graded nDCG + mAP replacing top-3), adopt k-fold
      cross-validation, exclude ambiguous labels, integrate BASEL phage panel, and test
      ordinal lysis potency prediction. Addresses the panel-size ceiling (0.823 AUC)
      and label-quality constraint (ambiguous 'n' scores) identified in Track GIANTS.

      Data landscape: Our panel has graded MLC 0-4 scores (dilution potency). BASEL
      (52 phages × 25 ECOR bacteria) is binary only — their spot test used >10^9 pfu/ml
      (single concentration), equivalent to our MLC≥1. BASEL lysis maps to relevance=1,
      BASEL no-lysis maps to relevance=0.
    stage: 7
    depends_on:
    - GIANTS
    tasks:
    - id: SX01
      title: Graded evaluation framework + clean-label baseline
      model: claude-opus-4-6
      ci_image_profile: base
      status: pending
      depends_on_tasks: []
      acceptance_criteria:
      - 'PRE-FLIGHT GATE: Using existing GT03 holdout predictions, check whether mean
        predicted P(lysis) increases monotonically across MLC grades 1→2→3→4. If
        predictions are flat across grades (Spearman ρ < 0.1 between predicted prob
        and MLC grade among positives), graded nDCG collapses to binary mAP — drop
        graded nDCG and cancel SX04.'
      - Implement per-bacterium nDCG with graded relevance (MLC 0-4 scores)
      - Implement per-bacterium mAP (binary threshold ≥1)
      - Both metrics must support partial ground truth — score only observed pairs
        per bacterium, ignore pairs with NULL label
      - Implement k-fold CV over bacteria (k=10, bacteria-stratified, deterministic
        fold assignment) as the primary evaluation protocol
      - Implement bootstrap CIs paired by bacterium for both metrics (1000 resamples)
      - Delete top-3 hit rate from the metric suite entirely — no legacy column
      - Keep AUC + Brier as secondary metrics
      - Rerun best model (GT03 all_gates_rfe + AX02 per-phage blending) on clean
        training data (exclude pairs where any raw observation has score='n' and no
        score='1')
      - Evaluate with new metric suite — this establishes the SPANDEX baseline
      - Record pre-flight results and baseline metrics in track_SPANDEX.md
    - id: SX02
      title: BASEL phage feature computation
      model: claude-opus-4-6
      ci_image_profile: base
      status: pending
      depends_on_tasks: []
      acceptance_criteria:
      - 'PRE-FLIGHT GATE: Before running full annotation pipeline, check BASEL phage
        taxonomy (family distribution from genome headers or NCBI metadata) and genome
        size distribution. If >80% of BASEL phages are from a single family, flag low
        diversity risk. Check how many BASEL phages have recognizable depolymerases
        by running DepoScope — if <5 phages have depolymerases, depo×capsule cross-terms
        (our only validated pairwise feature) will be sparse for BASEL.'
      - Run Pharokka on 52 BASEL phage genomes (already downloaded at .scratch/basel/genomes/)
      - Run DepoScope on Pharokka CDS output to identify depolymerases
      - Materialize all phage feature slots (phage_projection, phage_stats, phage_rbp_struct)
      - Compute pairwise cross-terms (depo×capsule, receptor×OMP) for BASEL phages
        × all bacteria in the panel
      - Verify feature distributions are non-degenerate (CV, unique value counts) for
        BASEL phages vs original Guelin phages
      - Record annotation statistics and feature quality in track_SPANDEX.md
    - id: SX03
      title: BASEL data integration + cross-source evaluation
      model: claude-opus-4-6
      ci_image_profile: base
      status: pending
      depends_on_tasks:
      - SX01
      - SX02
      acceptance_criteria:
      - 'PRE-FLIGHT GATE: Before training, compute expected marginal contribution
        of BASEL data — 1,240 new pairs (302 positive) added to ~32K clean training
        pairs = 3.8% increase. If BASEL phage features cluster entirely within
        existing Guelin phage feature space (nearest-neighbor overlap >90%), the
        training signal is likely redundant — run the evaluation anyway but flag
        low expected lift.'
      - Build unified observed-pairs table with source tracking (our panel MLC 0-4
        relevance, BASEL binary relevance 0/1)
      - 'Training arm A: Train on our clean data only → evaluate with k-fold CV
        (SX01 baseline replication)'
      - 'Training arm B: Train on our clean data + BASEL → evaluate with k-fold CV
        on same folds (does BASEL training data help original predictions?)'
      - 'Generalization arm C: Hold out all BASEL phages from training → predict
        BASEL phage × ECOR bacteria interactions from genomic features only → evaluate
        with nDCG/mAP on observed BASEL pairs (can the model predict for unseen phages?)'
      - 'Diagnostic: For ECOR holdout bacteria with both Guelin and BASEL ground truth,
        compare full-panel ranking (148 phages) vs original-only ranking (96 phages)
        — do BASEL phages steal top ranking slots?'
      - Compare all arms with bootstrap CIs
      - Record results, cross-source analysis, and biological interpretation in
        track_SPANDEX.md
    - id: SX04
      title: Ordinal lysis potency prediction
      model: claude-opus-4-6
      ci_image_profile: base
      status: pending
      depends_on_tasks:
      - SX01
      acceptance_criteria:
      - 'PRE-FLIGHT GATE (from SX01): If SX01 pre-flight showed predicted probabilities
        are flat across MLC grades (Spearman ρ < 0.1), cancel this ticket — ordinal
        prediction cannot help when the feature space does not separate potency levels.'
      - LightGBM regression predicting MLC score (0-4) directly instead of binary
        classification
      - Handle zero-inflation (79% MLC=0) via appropriate loss or two-stage model
      - BASEL pairs excluded from ordinal training (binary only, cannot contribute
        graded signal)
      - Evaluate with graded nDCG and Spearman rank correlation against MLC ground truth
      - Compare to binary classification baseline from SX01 — does explicit potency
        prediction improve nDCG?
      - If improvement >2pp nDCG, adopt ordinal prediction as default for future tracks
      - Record results in track_SPANDEX.md
