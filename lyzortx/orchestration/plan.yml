      all host features from raw genome assemblies using the same pipeline that runs
      at inference time. Replace binary thresholds with continuous scores where the
      gradient carries biological signal. Deduplicate redundant features found in
      the TL18 audit (91 wasted one-hot features from exact duplicates, plus derived
      summary features). The primary goal is deployment integrity — the model should
      be trained on exactly the features it will see at inference time. The secondary
      goal is richer features that give the model more information to work with. Source
      code lives in lyzortx/pipeline/deployment_paired_features/ — see the AGENTS.md
      there for feature design principles and assembly download guidance.
