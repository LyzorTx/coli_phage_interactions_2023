    - id: GT08
      title: GenoPHI binary protein-family features
      status: done
      model: claude-opus-4-6
      ci_image_profile: base
      depends_on_tasks:
      - GT06
      acceptance_criteria:
      - 'VARIANCE PRE-FLIGHT: After clustering, check that the binary feature matrix
        has meaningful variance — report number of clusters, fraction of non-singleton
        clusters, and whether cluster presence/absence discriminates lysed vs non-lysed
        pairs (median-split effect size). If features are degenerate (>90% zero or
        >90% one), stop and report.'
      - Run MMseqs2 clustering (identity 0.4, coverage 0.8) on all proteins from both
        host and phage genomes to create protein family clusters
      - Build binary presence-absence feature matrix (does genome X contain a member
